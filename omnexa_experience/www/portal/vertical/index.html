{% extends "templates/web.html" %}
{% block title %}Business Activity{% endblock %}
{% block page_content %}
<div class="ox-portal">
  <header class="oxp-header" id="oxp-header"></header>
  <main id="oxp-main"></main>
  <footer class="oxp-footer" id="oxp-footer"></footer>
</div>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const vertical = "{{ vertical or '' }}";
    OmnexaPortal.init("vertical", vertical || window.location.pathname.split("/").filter(Boolean).pop());
  });
</script>
{% endblock %}
